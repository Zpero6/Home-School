spring:
  datasource:
    url: jdbc:mysql://localhost:3306/home_school?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms


mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 开启驼峰命名
    map-underscore-to-camel-case: true
    # sql 执行日志输出到控制台
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.home.school.entity
  global-config:
    db-config:
      # 主键策略 : 全局自增
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: family-school-project-secret-key-2026-security
  expiration-time: 604800000     # 7天的毫秒数
